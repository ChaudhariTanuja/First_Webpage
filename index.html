<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        .container{
            display: flex;
            justify-content: space-around;
            background-color: pink;
            padding: 15px 30px;
        }
        .item{
            display: flex;
            justify-content: right;
            gap: 30px;
        }
        .box{
             padding: 5px 10px;
             border: 1px solid black;
             background-color: white;
             border-radius: 5px;
             cursor: pointer;
        }
        .nav{
            display:flex;
            justify-content: space-around;
            background-color: aqua;
            padding: 10px 15px;
        }
    </style>
    <style>
        .discount{
            padding:40px 80px;
            background-color: rgb(240, 195, 81);
        }
        .slider{
            display: flex;
            justify-content: space-between;
            margin: 30px;
        }
        
    </style>

    <style>
        *{
           margin: 0px;
           padding: 0px;
           box-sizing: border-box;
        }
        .stars{
            background-color: yellow;
            color: black;
            text-align: center;
            font-weight: bold;
            padding: 15px 0;
            width: 100vw;

        }
        .img{
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }
    </style>
    

    <title>this is my first website</title>
</head>
<body>
    <div class="container"> 
        <div class="logo">
            <h1 align="left">MYNTRA</h1>
        </div>
        <div class="search">
            <input type="text" placeholder="Search product">
        </div>
        <div class="item">
            <div class="box" >SignIN/LogIN</div>
            <div class="box">Address</div>
            <div class="box">Account</div>
        </div>
    </div>    

    <div class="nav">
            <a href="men">MEN</a>
            <a href="women">WOMEN</a>
            <a href="kids">KIDS</a>
            <a href="home">HOME</a>
            <a href="beauty">BEAUTY</a>
            <a href="genz">GENZ</a>
            <a href="studio">STUDIO</a> 
    </div>
        
    <div class="discount">
        <h2 align="center">“Big Fashion Deals You Can’t Miss”</h2>
        <p align="center">“Flat 25% OFF – Limited Time Only!”</p>
    </div> 
    <div class="slider">
        <img src="image1.png" class="slide" width="500px" height="200px">
        <img src="image2.png" class="slide" width="500px" height="200px">
        <img src="image3.png" class="slide" width="500px" height="200px">
    </div>  
    <div class="stars">
        <h1>RISING STARS</h1>
    </div> 
    <div class="img">
        <img src="RStar1.png" width="150" height="200">
        <img src="RStar2.png" width="150" height="200">
        <img src="RStar3.png" width="150" height="200">
        <img src="RStar4.png" width="150" height="200">
        <img src="RStar5.png" width="150" height="200">
        <img src="RStar6.png" width="150" height="200">
        <img src="RStar7.png" width="150" height="200">
        <img src="RStar8.png" width="150" height="200">   
    </div> 
    
</body>
</html>
